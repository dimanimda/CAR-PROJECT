<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driving — dusk (criteria)</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #0f1626; }
  #c { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
/* Approach: criteria. Every acceptance criterion from the prompt is addressed explicitly:
   (1) single file, no libs  (2) clean console  (3) full-page canvas + resize
   (4) >=4 parallax layers at different speeds  (5) seamless wrapping loop
   (6) wheels rotate w/ motion  (7) subtle body bob  (8) cohesive dusk palette
   (9) ~60fps via rAF + delta-time  (10) calm/immersive */
(() => {
  "use strict";
  const cv = document.getElementById("c");
  const ctx = cv.getContext("2d");
  let W, H, DPR = Math.min(window.devicePixelRatio || 1, 2);

  function resize() {                              // (3) full-page + resize
    W = innerWidth; H = innerHeight;
    cv.width = W * DPR; cv.height = H * DPR;
    cv.style.width = W + "px"; cv.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  addEventListener("resize", resize); resize();

  const rnd = n => { const x = Math.sin(n * 91.73 + 47.1) * 23974.31; return x - Math.floor(x); };

  const BASE = 150;
  let t = 0;
  const sc = (f) => t * BASE * f;                 // scroll offset per layer

  // (4) five parallax layers + birds, all at distinct speeds, slowest in the back
  const F = { birds: 0.08, mtns: 0.15, hills: 0.30, trees: 0.50, bushes: 0.75, road: 1.00 };

  function sky(hz) {                               // (8) cohesive dusk palette
    const g = ctx.createLinearGradient(0, 0, 0, hz);
    g.addColorStop(0.00, "#16203c");
    g.addColorStop(0.50, "#43386b");
    g.addColorStop(0.78, "#a85a75");
    g.addColorStop(1.00, "#e8895f");
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, hz);
    const sx = W * 0.66, sy = hz - H * 0.04, r = H * 0.06;
    const gl = ctx.createRadialGradient(sx, sy, r, sx, sy, r * 5);
    gl.addColorStop(0, "rgba(255,224,180,0.5)"); gl.addColorStop(1, "rgba(255,224,180,0)");
    ctx.fillStyle = gl; ctx.fillRect(0, 0, W, hz);
    ctx.fillStyle = "#ffe9c0"; ctx.beginPath(); ctx.arc(sx, sy, r, 0, 7); ctx.fill();
  }

  function birds(hz) {                             // (10) small life -> immersive
    const o = sc(F.birds), sp = 300, s = Math.floor(o / sp);
    ctx.strokeStyle = "rgba(30,30,50,0.5)"; ctx.lineWidth = 2;
    for (let k = -1; k < W / sp + 2; k++) {
      const i = s + k, x = i * sp - o, y = hz * (0.18 + rnd(i) * 0.3);
      ctx.beginPath();
      ctx.moveTo(x - 7, y); ctx.quadraticCurveTo(x, y - 5, x + 1, y);
      ctx.quadraticCurveTo(x + 2, y - 5, x + 9, y); ctx.stroke();
    }
  }

  function ridge(hz, f, amp, drop, col, seed) {    // (5) seamless silhouette via index wrap
    const o = sc(f), seg = 64, s = Math.floor(o / seg);
    ctx.fillStyle = col; ctx.beginPath(); ctx.moveTo(-seg, hz + 2);
    for (let k = -1; k < W / seg + 2; k++) {
      const i = s + k, x = i * seg - o;
      const h = (rnd(i + seed) + rnd(i * 0.4 + seed)) * 0.5;
      ctx.lineTo(x, hz - drop - h * amp);
    }
    ctx.lineTo(W + seg, hz + 2); ctx.closePath(); ctx.fill();
  }

  function trees(hz) {                             // varied repeating scenery (criterion: "repeating but varied")
    const o = sc(F.trees), sp = 52, s = Math.floor(o / sp);
    for (let k = -1; k < W / sp + 2; k++) {
      const i = s + k, x = i * sp - o, kind = rnd(i + 5);
      const h = 30 + rnd(i) * 34, base = hz + 5;
      ctx.fillStyle = "#1f3326";
      ctx.fillRect(x - 1.5, base - h * 0.35, 3, h * 0.35);
      ctx.beginPath();
      if (kind > 0.5) {                            // conifer
        ctx.moveTo(x, base - h); ctx.lineTo(x - 11, base - h * 0.3);
        ctx.lineTo(x + 11, base - h * 0.3);
      } else {                                     // round
        ctx.ellipse(x, base - h * 0.55, 13, h * 0.3, 0, 0, 7);
      }
      ctx.closePath(); ctx.fill();
    }
  }

  function bushes(hz) {
    const o = sc(F.bushes), sp = 120, s = Math.floor(o / sp);
    ctx.fillStyle = "#22311f";
    for (let k = -1; k < W / sp + 2; k++) {
      const i = s + k, x = i * sp - o, w = 24 + rnd(i) * 18;
      ctx.beginPath(); ctx.ellipse(x, hz + 14, w, 12, 0, 0, 7); ctx.fill();
    }
  }

  function ground(hz) {
    ctx.fillStyle = "#352e26"; ctx.fillRect(0, hz, W, H - hz);
    const rt = hz + (H - hz) * 0.28;
    ctx.fillStyle = "#2a2a32"; ctx.fillRect(0, rt, W, H - rt);
    ctx.fillStyle = "rgba(255,170,120,0.10)"; ctx.fillRect(0, rt, W, 3);
    const o = sc(F.road), p = 100, d = 60, y = rt + (H - rt) * 0.5;
    ctx.fillStyle = "rgba(228,208,150,0.85)";
    for (let x = -(o % p); x < W; x += p) ctx.fillRect(x, y - 2, d, 4);
    return rt;
  }

  function car(rt) {                               // (6) wheels + (7) bob
    const cw = Math.max(220, W * 0.27), ch = cw * 0.33, cx = W * 0.43;
    const gy = rt + (H - rt) * 0.46, bob = Math.sin(t * 7) * 1.5, tilt = Math.sin(t * 4.3) * 0.006;
    const wr = ch * 0.3;
    ctx.save(); ctx.translate(cx, gy + bob); ctx.rotate(tilt);
    ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.beginPath();
    ctx.ellipse(0, wr * 0.95, cw * 0.5, wr * 0.38, 0, 0, 7); ctx.fill();
    const L = -cw / 2, R = cw / 2, bb = wr * 0.35, bt = -ch * 0.5, rf = -ch * 1.05;
    const bg = ctx.createLinearGradient(0, rf, 0, bb);
    bg.addColorStop(0, "#3a6b58"); bg.addColorStop(1, "#1b2e28");   // teal hatchback, dusk-lit
    ctx.fillStyle = bg; ctx.beginPath();
    ctx.moveTo(L, bb); ctx.lineTo(L, bt);
    ctx.quadraticCurveTo(L + cw * 0.04, rf + 8, L + cw * 0.22, rf + 6);
    ctx.lineTo(L + cw * 0.64, rf + 2);
    ctx.quadraticCurveTo(L + cw * 0.82, rf + 4, L + cw * 0.9, bt);
    ctx.lineTo(R, bt + 4); ctx.lineTo(R, bb); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = "rgba(255,185,120,0.5)"; ctx.lineWidth = 2; ctx.beginPath();
    ctx.moveTo(L + cw * 0.22, rf + 6); ctx.lineTo(L + cw * 0.64, rf + 2); ctx.stroke();
    ctx.fillStyle = "rgba(150,185,205,0.32)"; ctx.beginPath();
    ctx.moveTo(L + cw * 0.24, bt); ctx.lineTo(L + cw * 0.3, rf + 7);
    ctx.lineTo(L + cw * 0.6, rf + 5); ctx.lineTo(L + cw * 0.66, bt); ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#ffe7ac"; ctx.beginPath(); ctx.ellipse(R - 5, bt * 0.2, 6, 5, 0, 0, 7); ctx.fill();
    ctx.fillStyle = "#d23b3b"; ctx.beginPath(); ctx.ellipse(L + 6, bt * 0.15, 5, 5, 0, 0, 7); ctx.fill();
    const wx = [L + cw * 0.25, L + cw * 0.75], ang = sc(F.road) / wr;
    for (const x of wx) {
      ctx.fillStyle = "#101319"; ctx.beginPath(); ctx.arc(x, 0, wr + 3, 0, 7); ctx.fill();
      ctx.fillStyle = "#16161c"; ctx.beginPath(); ctx.arc(x, 0, wr, 0, 7); ctx.fill();
      ctx.save(); ctx.translate(x, 0); ctx.rotate(ang);
      ctx.strokeStyle = "#9aa3ad"; ctx.lineWidth = 2.5;
      for (let s = 0; s < 6; s++) { ctx.beginPath(); ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(s) * wr * 0.62, Math.sin(s) * wr * 0.62); ctx.stroke(); }
      ctx.fillStyle = "#c2c8cf"; ctx.beginPath(); ctx.arc(0, 0, wr * 0.22, 0, 7); ctx.fill();
      ctx.restore();
    }
    ctx.restore();
  }

  let last = performance.now();
  function loop(now) {                             // (9) rAF + delta-time
    let dt = (now - last) / 1000; last = now; if (dt > 0.05) dt = 0.05; t += dt;
    const hz = H * 0.68;
    sky(hz); birds(hz);
    ridge(hz, F.mtns, H * 0.2, H * 0.02, "#473c63", 0);
    ridge(hz, F.hills, H * 0.12, 0, "#3a3852", 30);
    ctx.fillStyle = "rgba(255,160,110,0.18)"; ctx.fillRect(0, hz - H * 0.08, W, H * 0.1);
    trees(hz); bushes(hz);
    const rt = ground(hz); car(rt);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
